<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f7f6f3">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>תזונה ואימונים</title>
<link rel="manifest" href="manifest.json">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#f7f6f3; --card:#ffffff; --card2:#f2f1ed; --line:#e3e1db;
    --line2:#cfccc3; --txt:#1c1a17; --mut:#7b766c; --dim:#a8a49a;
    --acc:#4d7c0f; --accbg:#eaf3d8; --accbd:#b9d68a;
    --red:#c2410c;
  }
  body{background:var(--bg);color:var(--txt);min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Assistant",system-ui,sans-serif;
    padding:16px;padding-bottom:70px;font-size:15px}
  .wrap{max-width:1000px;margin:0 auto}

  .tabs{display:flex;gap:5px;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:5px;margin-bottom:20px}
  .tabs button{flex:1;padding:10px 4px;border:0;border-radius:8px;background:none;color:var(--mut);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:.15s}
  .tabs button.on{background:var(--acc);color:#fff}

  header{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:18px}
  .eyebrow{font-size:10px;letter-spacing:.25em;color:var(--acc);margin-bottom:5px;font-weight:600}
  h1{font-size:28px;font-weight:800;letter-spacing:-.02em}
  .stat{text-align:left}
  .stat .l{font-size:11px;color:var(--mut);margin-bottom:2px}
  .stat .v{display:flex;align-items:baseline;gap:5px;justify-content:flex-end}
  .stat b{font-size:36px;font-weight:800;color:var(--acc);font-variant-numeric:tabular-nums;line-height:1}
  .stat span{font-size:13px;color:var(--mut)}

  .bar{height:6px;background:var(--line);border-radius:99px;overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--acc);border-radius:99px;transition:width .4s}
  .barrow{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--mut);align-items:center;margin-bottom:20px}
  .barrow label{display:flex;align-items:center;gap:6px}

  input,textarea{font-family:inherit;color:var(--txt);background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:14px;outline:none;width:100%}
  input:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px #4d7c0f1a}
  input::placeholder,textarea::placeholder{color:var(--dim)}
  input.num{width:52px;text-align:center;font-variant-numeric:tabular-nums;padding:8px 3px}
  .goal{width:54px;padding:3px 6px;font-size:11px;text-align:center}
  .sec-lbl{font-size:11px;color:var(--mut);font-weight:600;display:block;margin:0 0 6px}

  .card{border:1px solid var(--line);background:var(--card);border-radius:14px;margin-bottom:14px;transition:.2s;box-shadow:0 1px 2px #0000000a}
  .card.done{border-color:var(--accbd);background:var(--accbg)}
  .chead{display:flex;align-items:center;justify-content:space-between;padding:15px 16px 10px}
  .cleft{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
  .ctitle{font-weight:700;font-size:16px}
  .card.done .ctitle{color:var(--acc)}
  .csub{font-size:11px;color:var(--dim);margin-top:1px}

  .chk{width:25px;height:25px;border-radius:7px;border:2px solid var(--line2);background:var(--card);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
  .chk:hover{border-color:var(--mut)}
  .chk.on{background:var(--acc);border-color:var(--acc)}
  .chk svg{display:none;width:14px;height:14px}
  .chk.on svg{display:block}
  .chk.sm{width:19px;height:19px;border-radius:5px}
  .chk.sm svg{width:11px;height:11px}

  .pen{background:none;border:0;color:var(--dim);cursor:pointer;padding:3px;display:flex;flex-shrink:0}
  .pen:hover,.pen.on{color:var(--acc)}
  .pen svg{width:15px;height:15px}

  .mnote{padding:0 16px 12px}
  .mnote input{font-size:12px;padding:7px 10px;background:var(--card2)}
  .cols{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;padding:0 16px 16px}
  @media(max-width:640px){.cols{grid-template-columns:1fr}}
  .col{position:relative}
  .colh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .colh label{font-size:11px;color:var(--mut);font-weight:600}
  .sel{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 12px;border-radius:9px;border:1px solid var(--line);background:var(--card2);color:var(--dim);font-size:14px;text-align:right;cursor:pointer;font-family:inherit}
  .sel:hover{border-color:var(--line2)}
  .sel.has{background:var(--card);border-color:var(--line2);color:var(--txt);font-weight:500}
  .sel .t{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sel svg{width:15px;height:15px;flex-shrink:0;color:var(--mut);transition:transform .2s}
  .sel.open svg{transform:rotate(180deg)}
  .menu{position:absolute;z-index:30;top:100%;margin-top:4px;width:100%;background:var(--card);border:1px solid var(--line2);border-radius:9px;overflow:hidden;box-shadow:0 12px 28px #0000001f}
  .menu button{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 12px;background:none;border:0;color:var(--txt);font-size:14px;text-align:right;cursor:pointer;font-family:inherit}
  .menu button:hover{background:var(--card2)}
  .menu button.act{color:var(--acc);background:var(--accbg);font-weight:600}
  .menu button i{font-style:normal;font-size:10px;color:var(--mut);font-variant-numeric:tabular-nums;flex-shrink:0}
  .menu .clr{border-top:1px solid var(--line);color:var(--mut);font-size:12px;justify-content:flex-start}
  .menu .empty{padding:12px;font-size:12px;color:var(--mut)}

  .edit{background:var(--card2);border:1px solid var(--accbd);border-radius:9px;padding:10px}
  .eh{display:flex;gap:6px;font-size:10px;color:var(--dim);padding:0 2px 4px}
  .eh .f{flex:1}.eh .n{width:52px;text-align:center}.eh .x{width:22px}
  .erow{display:flex;gap:6px;margin-bottom:6px}
  .erow input{font-size:13px;padding:7px 9px}
  .del{width:22px;background:none;border:0;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .del:hover{color:var(--red)}
  .del svg{width:15px;height:15px}
  .add{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:8px;border:1px dashed var(--line2);background:none;color:var(--mut);font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:6px}
  .add:hover{border-color:var(--acc);color:var(--acc);background:var(--accbg)}
  .add svg{width:14px;height:14px}
  .fin{width:100%;padding:8px;border-radius:7px;border:0;background:var(--acc);color:#fff;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}

  .weeks{display:flex;gap:6px;margin-bottom:18px}
  .weeks button{flex:1;padding:11px 6px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--mut);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
  .weeks button.on{background:var(--accbg);border-color:var(--acc);color:var(--acc)}
  .weeks button i{display:block;font-style:normal;font-size:10px;color:var(--dim);margin-top:2px;font-weight:400}
  .weeks button.on i{color:var(--acc)}

  .exs{padding:0 16px 8px}
  .ex{border:1px solid var(--line);background:var(--card2);border-radius:11px;padding:11px;margin-bottom:9px;transition:.2s}
  .ex.done{border-color:var(--accbd);background:var(--accbg)}
  .exh{display:flex;align-items:center;gap:9px;margin-bottom:8px}
  .exinfo{flex:1;min-width:0}
  .musc{display:inline-block;font-size:10px;font-weight:700;color:var(--acc);background:var(--accbg);border:1px solid var(--accbd);padding:2px 7px;border-radius:5px;margin-bottom:3px}
  .exname{font-weight:600;font-size:14px}
  .exnote{font-size:11px;color:var(--mut);margin-top:3px;font-style:italic}
  .sets{display:flex;flex-wrap:wrap;gap:6px}
  .set{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:5px 7px}
  .set.on{border-color:var(--accbd);background:#f5fae9}
  .set .n{font-size:10px;color:var(--dim);font-weight:700;min-width:12px}
  .set input{width:44px;padding:4px 2px;font-size:12px;text-align:center;border-radius:5px;font-variant-numeric:tabular-nums;background:var(--card2)}
  .set em{font-style:normal;font-size:9px;color:var(--dim)}
  .exedit{background:var(--card);border:1px solid var(--accbd);border-radius:9px;padding:10px;margin-bottom:9px}
  .exedit .r{display:flex;gap:6px;margin-bottom:6px;align-items:center}
  .exedit .r input{font-size:13px;padding:7px 9px;background:var(--card2)}
  .exedit .lbl{font-size:10px;color:var(--mut);width:38px;flex-shrink:0}

  /* weight */
  .wform{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:16px;box-shadow:0 1px 2px #0000000a}
  .wform .row{display:flex;gap:8px;align-items:flex-end}
  .wform .f{flex:1}
  .wform .f label{font-size:11px;color:var(--mut);font-weight:600;display:block;margin-bottom:5px}
  .wform button{padding:9px 18px;border-radius:8px;border:0;background:var(--acc);color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap}
  svg.chart{width:100%;height:190px;display:block}
  .chartbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 10px 8px;margin-bottom:16px;box-shadow:0 1px 2px #0000000a}
  .wrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:7px}
  .wrow .d{font-size:13px;color:var(--mut);flex:1;font-variant-numeric:tabular-nums}
  .wrow .kg{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
  .wrow .dv{font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;min-width:44px;text-align:left}
  .up{color:var(--red)} .down{color:var(--acc)} .same{color:var(--dim)}
  .wrow input{width:70px;text-align:center;font-variant-numeric:tabular-nums;font-weight:700;padding:6px}
  .empty-msg{text-align:center;color:var(--mut);font-size:13px;padding:26px 10px}

  /* day navigator */
  .daynav{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px;margin-bottom:14px;box-shadow:0 1px 2px #0000000a}
  .daynav button{width:40px;height:40px;border-radius:9px;border:1px solid var(--line);background:var(--card2);color:var(--txt);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
  .daynav button:hover:not(:disabled){background:var(--accbg);border-color:var(--acc);color:var(--acc)}
  .daynav button:disabled{opacity:.3;cursor:default}
  .daynav button svg{width:18px;height:18px}
  .dinfo{flex:1;text-align:center}
  .dlbl{font-weight:700;font-size:15px}
  .ddate{font-size:11px;color:var(--mut);margin-top:1px}
  .wrow.cur{border-color:var(--acc);background:var(--accbg)}
  .cyc{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:14px}
  .cyc .t{font-size:12px;color:var(--mut)}
  .cyc .t b{color:var(--txt);font-size:13px}
  .cyc button{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;border:1px solid var(--line2);background:var(--card);color:var(--txt);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
  .cyc button:hover{border-color:var(--acc);color:var(--acc);background:var(--accbg)}
  .cyc button svg{width:14px;height:14px}
  .status{position:fixed;bottom:0;left:0;right:0;text-align:center;font-size:11px;color:var(--dim);padding:10px;background:linear-gradient(transparent,var(--bg) 40%);pointer-events:none}
  .status.err{color:var(--red);font-weight:600}
  .load{min-height:100vh;display:flex;align-items:center;justify-content:center}
  @keyframes sp{to{transform:rotate(360deg)}}
  .sp{width:24px;height:24px;border:2px solid var(--line);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite}
</style>
</head>

  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',

};
function setStatus(t,e){const el=document.getElementById("status");if(el){el.textContent=t;el.className="status"+(e?" err":"");}}

async function load(){
  let err=null;
  try{
    const r=await fetch(SB_URL+"/rest/v1/app_state?select=key,data&key=in.(nutrition,workouts,weights)",{headers:HDRS});
    if(!r.ok) throw new Error("HTTP "+r.status+" "+(await r.text()));
    const rows=await r.json();
    const g=k=>{const x=rows.find(v=>v.key===k);return (x&&x.data)||{};};
    N=Object.assign({},DEF_N,g("nutrition"));
    if(!N.options||!Object.keys(N.options).length) N.options=SEED_N;
    if(!N.days) N.days={};
    /* migrate old flat format -> today's record */
    if(N.picks||N.eaten){
      const t=today();
      if(!N.days[t]) N.days[t]={picks:N.picks||{},eaten:N.eaten||{}};
      delete N.picks; delete N.eaten;
    }
    W=Object.assign({},JSON.parse(JSON.stringify(DEF_W)),g("workouts"));
    if(!W.sessions||!W.sessions.length) W.sessions=JSON.parse(JSON.stringify(SEED_W.sessions));
    for(const k of [1,2,3]) if(!W.weeks[k]) W.weeks[k]={reps:{},wt:{},doneSet:{},doneEx:{},doneSes:{}};
    if(!W.cycle) W.cycle=1;
    G=Object.assign({},DEF_G,g("weights"));
    if(!Array.isArray(G.entries)) G.entries=[];
  }catch(e){
    err=e.message||String(e);
    N=JSON.parse(JSON.stringify(DEF_N));
    W=JSON.parse(JSON.stringify(DEF_W));
    G=JSON.parse(JSON.stringify(DEF_G));
  }
  if(!day) day=today();
  render();
  if(err) setStatus("שגיאת טעינה: "+err,true);
}
async function push(k,d){
  const r=await fetch(SB_URL+"/rest/v1/app_state?on_conflict=key",{method:"POST",
    headers:Object.assign({},HDRS,{Prefer:"resolution=merge-duplicates"}),
    body:JSON.stringify({key:k,data:d,updated_at:new Date().toISOString()})});
  if(!r.ok) throw new Error("HTTP "+r.status+" "+(await r.text()));
}
async function save(){
  setStatus("שומר…");
  try{ await Promise.all([push("nutrition",N),push("workouts",W),push("weights",G)]);
    setStatus("נשמר · שניכם רואים את אותו דבר");
  }catch(e){ setStatus("שגיאת שמירה: "+(e.message||e),true); }
}
const soon=()=>{clearTimeout(timer);timer=setTimeout(save,600);};

/* ---- nutrition (per-day) ---- */
function protein(d){
  const rec=N.days[d]; if(!rec) return 0;
  let t=0;
  for(const m of MEALS){
    if(!rec.eaten[m.id]) continue;
    for(const c of m.cols){
      const o=(N.options[m.id]?.[c.id]||[]).find(o=>o.id===rec.picks[m.id+"."+c.id]);
      if(o) t+=Number(o.p)||0;
    }
  }
  return t;
}
function mealsEaten(d){const r=N.days[d];if(!r)return 0;return MEALS.filter(m=>r.eaten[m.id]).length;}

/* ---- workouts ---- */

  let tot=0,dn=0;
  W.sessions.forEach(s=>s.exercises.forEach(e=>{tot++;if(wk.doneEx[e.id])dn++;}));
  const pct=tot?Math.round(dn/tot*100):0;
  let h='<header><div><div class="eyebrow">תוכנית</div><h1>אימונים</h1></div>'
   +'<div class="stat"><div class="l">תרגילים שבוצעו</div><div class="v"><b>'+dn+'</b><span>/ '+tot+'</span></div></div></header>'
   +'<div class="bar"><i style="width:'+pct+'%"></i></div>'
   +'<div class="barrow"><span>'+pct+'% מהשבוע</span><span>שבוע '+week+'</span></div>';

  let aT=0,aD=0;

  h+='<button class="add" data-sesadd="1" style="padding:13px;margin-top:4px">'+I.plus+' הוסף אימון</button>';
  return h;
}

/* ---- weight ---- */
function sorted(){return G.entries.slice().sort((a,b)=>a.date<b.date?-1:1);}

function chart(){
  const e=sorted();
  if(e.length<2) return '<div class="chartbox"><div class="empty-msg">צריך לפחות 2 שקילות כדי להציג גרף</div></div>';
  const W2=600,H=190,pad={t:16,r:14,b:24,l:40};
  const kg=e.map(x=>x.kg);
  let mn=Math.min(...kg), mx=Math.max(...kg);
  const sp=(mx-mn)||2; mn-=sp*.18; mx+=sp*.18;
  const X=i=>pad.l+(i/(e.length-1))*(W2-pad.l-pad.r);
  const Y=v=>pad.t+(1-(v-mn)/(mx-mn))*(H-pad.t-pad.b);
  const pts=e.map((x,i)=>X(i)+","+Y(x.kg));
  let g='<svg class="chart" viewBox="0 0 '+W2+' '+H+'" preserveAspectRatio="none">';
  for(let i=0;i<=3;i++){
    const v=mn+(mx-mn)*i/3, y=Y(v);
    g+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(W2-pad.r)+'" y2="'+y+'" stroke="#e3e1db" stroke-width="1"/>'
     +'<text x="'+(pad.l-6)+'" y="'+(y+4)+'" fill="#a8a49a" font-size="10" text-anchor="end">'+v.toFixed(1)+'</text>';
  }
  g+='<polyline points="'+pts.join(" ")+'" fill="none" stroke="#4d7c0f" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  e.forEach((x,i)=>{g+='<circle cx="'+X(i)+'" cy="'+Y(x.kg)+'" r="3.5" fill="#fff" stroke="#4d7c0f" stroke-width="2"/>';});
  const step=Math.ceil(e.length/6);
  e.forEach((x,i)=>{ if(i%step===0||i===e.length-1)
    g+='<text x="'+X(i)+'" y="'+(H-6)+'" fill="#a8a49a" font-size="10" text-anchor="middle">'+fmtD(x.date)+'</text>'; });
  g+='</svg>';
  return '<div class="chartbox">'+g+'</div>';
}

function viewWt(){
  const e=sorted(), last=e[e.length-1], first=e[0];
  const diff = (last&&first&&e.length>1) ? (last.kg-first.kg) : 0;
  const dc = diff>0?"up":diff<0?"down":"same";
  let h='<header><div><div class="eyebrow">מעקב</div><h1>משקל</h1></div>'
   +'<div class="stat"><div class="l">משקל אחרון</div><div class="v"><b>'+(last?last.kg.toFixed(1):"—")+'</b><span>ק״ג</span></div></div></header>';
  if(e.length>1) h+='<div class="barrow" style="margin-top:-4px"><span>סה״כ שינוי מהשקילה הראשונה</span>'
    +'<span class="'+dc+'" style="font-weight:700">'+(diff>0?"+":"")+diff.toFixed(1)+' ק״ג</span></div>';

  h+='<div class="wform"><div class="row">'
   +'<div class="f"><label>תאריך</label><input type="date" id="wd" value="'+today()+'"></div>'
   +'<div class="f"><label>משקל (ק״ג)</label><input type="number" step="0.1" id="wk" placeholder="0.0"></div>'
   +'<button data-wadd="1">הוסף</button></div>'
   +'<div style="font-size:11px;color:var(--mut);margin-top:8px">אפשר לבחור תאריך אחורה אם שכחת לרשום</div></div>';

  h+=chart();

  h+='<label class="sec-lbl">היסטוריה</label>';
  if(!e.length){ h+='<div class="wrow"><div class="empty-msg" style="flex:1">אין שקילות עדיין</div></div>'; return h; }

  const rev=e.slice().reverse();
  rev.forEach((x,i)=>{
    const prev = rev[i+1];
    const d = prev ? x.kg-prev.kg : null;
    const cls = d===null?"same":(d>0?"up":d<0?"down":"same");
    const txt = d===null?"—":((d>0?"+":"")+d.toFixed(1));
    if(wEdit===x.id){
      h+='<div class="wrow" style="border-color:var(--accbd)">'
       +'<input type="date" data-wed="'+x.id+'|date" value="'+x.date+'" style="flex:1">'
       +'<input type="number" step="0.1" data-wed="'+x.id+'|kg" value="'+x.kg+'">'
       +'<button class="pen on" data-wfin="1">'+I.x+'</button>'
       +'<button class="del" data-wdel="'+x.id+'">'+I.trash+'</button></div>';
    }else{
      h+='<div class="wrow"><span class="d">'+x.date.split("-").reverse().join("/")+'</span>'
       +'<span class="dv '+cls+'">'+txt+'</span>'
       +'<span class="kg">'+x.kg.toFixed(1)+' <span style="font-size:11px;color:var(--dim);font-weight:400">ק״ג</span></span>'
       +'<button class="pen" data-wer="'+x.id+'">'+I.pen+'</button></div>';
    }
  });
  return h;
}

function render(){
  let h='<div class="wrap"><div class="tabs">'
   +'<button class="'+(tab==="nut"?"on":"")+'" data-tab="nut">תזונה</button>'
   +'<button class="'+(tab==="wo"?"on":"")+'" data-tab="wo">אימונים</button>'
   +'<button class="'+(tab==="wt"?"on":"")+'" data-tab="wt">משקל</button></div>';
  h+= tab==="nut"?viewNut(): tab==="wo"?viewWo(): viewWt();
  h+='</div><div class="status" id="status">נשמר · שניכם רואים את אותו דבר</div>';
  document.getElementById("root").innerHTML=h;
  bind();
}

function bind(){
  const $=s=>document.querySelectorAll(s);
  $("[data-tab]").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;openMenu=editKey=exEdit=sesEdit=wEdit=null;render();});
  $("[data-week]").forEach(b=>b.onclick=()=>{week=+b.dataset.week;exEdit=sesEdit=null;render();});

  /* nutrition — day navigation */
  $("[data-dnav]").forEach(b=>b.onclick=()=>{
    const n=+b.dataset.dnav;
    const next=shift(day,n);
    if(n>0 && next>today()) return;      // never go past today
    day=next; openMenu=editKey=null; render();
  });
  $("[data-dtoday]").forEach(b=>b.onclick=()=>{day=today();openMenu=editKey=null;render();});
  $("[data-hist]").forEach(b=>b.onclick=()=>{showHist=!showHist;render();});
  $("[data-goday]").forEach(b=>b.onclick=()=>{day=b.dataset.goday;showHist=false;render();});

  /* nutrition — per-day marks */
  $("[data-eat]").forEach(b=>b.onclick=()=>{const r=D(day),i=b.dataset.eat;r.eaten[i]=!r.eaten[i];save();render();});
  $("[data-nopen]").forEach(b=>b.onclick=e=>{e.stopPropagation();openMenu=openMenu===b.dataset.nopen?null:b.dataset.nopen;render();});
  $("[data-npick]").forEach(b=>b.onclick=()=>{const r=D(day);const[k,i]=b.dataset.npick.split("|");
    if(i)r.picks[k]=i;else delete r.picks[k];openMenu=null;save();render();});
  $("[data-ned]").forEach(b=>b.onclick=()=>{editKey=editKey===b.dataset.ned?null:b.dataset.ned;openMenu=null;render();});
  $("[data-fin]").forEach(b=>b.onclick=()=>{editKey=null;save();render();});
  $("[data-nadd]").forEach(b=>b.onclick=()=>{const[m,c]=b.dataset.nadd.split(".");N.options[m][c].push({id:uid(),name:"",p:0});save();render();});
  $("[data-ndel]").forEach(b=>b.onclick=()=>{const[k,i]=b.dataset.ndel.split("|");const[m,c]=k.split(".");
    const rm=N.options[m][c][+i];
    Object.values(N.days).forEach(r=>{if(r.picks[k]===rm.id)delete r.picks[k];});
    N.options[m][c].splice(+i,1);save();render();});
  $("[data-nopt]").forEach(x=>x.oninput=()=>{const[k,i,f]=x.dataset.nopt.split("|");const[m,c]=k.split(".");
    N.options[m][c][+i][f]=f==="p"?(Number(x.value)||0):x.value;soon();});
  $("[data-nnote]").forEach(x=>x.oninput=()=>{N.mealNotes[x.dataset.nnote]=x.value;soon();});
  $("[data-nf]").forEach(x=>x.oninput=()=>{const f=x.dataset.nf;N[f]=f==="goal"?(Number(x.value)||0):x.value;soon();
    if(f==="goal"&&tab==="nut"){const t=protein(day),p=Math.min(100,Math.round(t/(N.goal||1)*100));
      document.querySelector(".bar>i").style.width=p+"%";
      document.querySelector(".barrow span").textContent=p+"% מהיעד";
      document.querySelector(".stat span").textContent="/ "+N.goal+" גר׳";}});

  /* workouts — new cycle: clear ONLY the done marks */
  $("[data-cycle]").forEach(b=>b.onclick=()=>{
    if(!confirm("להתחיל מחזור חדש?\n\nכל סימוני ה\"בוצע\" יתאפסו.\nהתרגילים, החזרות והמשקלים יישארו.")) return;
    for(const w of [1,2,3]){
      const wk=W.weeks[w];
      wk.doneSet={}; wk.doneEx={}; wk.doneSes={};
    }
    W.cycle=(W.cycle||1)+1;
    week=1; exEdit=sesEdit=null;
    save(); render();
  });

  $("[data-wses]").forEach(b=>b.onclick=()=>{
    const sid=b.dataset.wses,wk=W.weeks[week],on=!wk.doneSes[sid];
    wk.doneSes[sid]=on;
    const ses=W.sessions.find(s=>s.id===sid);
    ses.exercises.forEach(e=>{wk.doneEx[e.id]=on;for(let s=0;s<(Number(e.sets)||1);s++)wk.doneSet[e.id+"_"+s]=on;});
    save();render();});
  $("[data-wex]").forEach(b=>b.onclick=()=>{
    const[sid,eid]=b.dataset.wex.split("|"),wk=W.weeks[week],on=!wk.doneEx[eid];
    wk.doneEx[eid]=on;
    const ses=W.sessions.find(s=>s.id===sid),ex=ses.exercises.find(e=>e.id===eid);
    for(let s=0;s<(Number(ex.sets)||1);s++)wk.doneSet[eid+"_"+s]=on;
    wk.doneSes[sid]=ses.exercises.every(e=>wk.doneEx[e.id]);
    save();render();});
  $("[data-wset]").forEach(b=>b.onclick=()=>{
    const[sid,eid,si]=b.dataset.wset.split("|"),wk=W.weeks[week],k=eid+"_"+si;
    wk.doneSet[k]=!wk.doneSet[k];
    const ses=W.sessions.find(s=>s.id===sid),ex=ses.exercises.find(e=>e.id===eid);
    let all=true;for(let s=0;s<(Number(ex.sets)||1);s++)if(!wk.doneSet[eid+"_"+s])all=false;
    wk.doneEx[eid]=all;
    wk.doneSes[sid]=ses.exercises.every(e=>wk.doneEx[e.id]);
    save();render();});
  $("[data-wv]").forEach(x=>x.oninput=()=>{
    const[f,k]=x.dataset.wv.split("|");
    if(x.value==="")delete W.weeks[week][f][k]; else W.weeks[week][f][k]=Number(x.value);
    soon();});
  $("[data-exer]").forEach(b=>b.onclick=()=>{exEdit=exEdit===b.dataset.exer?null:b.dataset.exer;sesEdit=null;render();});
  $("[data-exfin]").forEach(b=>b.onclick=()=>{exEdit=null;save();render();});
  $("[data-ex]").forEach(x=>x.oninput=()=>{const[si,xi,f]=x.dataset.ex.split("|");
    const ex=W.sessions[+si].exercises[+xi];
    ex[f]=f==="sets"?Math.max(1,Math.min(10,Number(x.value)||1)):x.value;soon();});
  $("[data-exadd]").forEach(b=>b.onclick=()=>{const si=+b.dataset.exadd;
    const ne={id:uid(),muscle:"",name:"",sets:3,note:""};
    W.sessions[si].exercises.push(ne);exEdit=ne.id;save();render();});
  $("[data-exdel]").forEach(b=>b.onclick=()=>{const[si,xi]=b.dataset.exdel.split("|");
    const ex=W.sessions[+si].exercises[+xi];
    for(const w of[1,2,3]){const wk=W.weeks[w];delete wk.doneEx[ex.id];
      ["doneSet","reps","wt"].forEach(f=>Object.keys(wk[f]).forEach(k=>{if(k.startsWith(ex.id+"_"))delete wk[f][k];}));}
    W.sessions[+si].exercises.splice(+xi,1);exEdit=null;save();render();});
  $("[data-seser]").forEach(b=>b.onclick=()=>{sesEdit=sesEdit===b.dataset.seser?null:b.dataset.seser;exEdit=null;render();});
  $("[data-sesname]").forEach(x=>x.oninput=()=>{W.sessions[+x.dataset.sesname].name=x.value;soon();});
  $("[data-sesadd]").forEach(b=>b.onclick=()=>{const id=uid();
    W.sessions.push({id,name:"אימון חדש",exercises:[]});sesEdit=id;save();render();});
  $("[data-sesdel]").forEach(b=>b.onclick=()=>{const si=+b.dataset.sesdel,ses=W.sessions[si];
    for(const w of[1,2,3]){const wk=W.weeks[w];delete wk.doneSes[ses.id];
      ses.exercises.forEach(e=>{delete wk.doneEx[e.id];
        ["doneSet","reps","wt"].forEach(f=>Object.keys(wk[f]).forEach(k=>{if(k.startsWith(e.id+"_"))delete wk[f][k];}));});}
    W.sessions.splice(si,1);sesEdit=null;save();render();});

  /* weight */
  $("[data-wadd]").forEach(b=>b.onclick=()=>{
    const d=document.getElementById("wd").value;
    const v=parseFloat(document.getElementById("wk").value);
    if(!d||isNaN(v)||v<=0){ setStatus("צריך תאריך ומשקל תקינים",true); return; }
    const ex=G.entries.find(x=>x.date===d);
    if(ex) ex.kg=v; else G.entries.push({id:uid(),date:d,kg:v});
    save();render();});
  $("[data-wer]").forEach(b=>b.onclick=()=>{wEdit=b.dataset.wer;render();});
  $("[data-wfin]").forEach(b=>b.onclick=()=>{wEdit=null;save();render();});
  $("[data-wed]").forEach(x=>x.oninput=()=>{const[id,f]=x.dataset.wed.split("|");
    const e=G.entries.find(v=>v.id===id);if(!e)return;
    if(f==="kg"){const v=parseFloat(x.value);if(!isNaN(v))e.kg=v;} else if(x.value) e.date=x.value;
    soon();});
  $("[data-wdel]").forEach(b=>b.onclick=()=>{
    G.entries=G.entries.filter(x=>x.id!==b.dataset.wdel);wEdit=null;save();render();});

  document.onclick=e=>{if(openMenu&&!e.target.closest(".col")){openMenu=null;render();}};
}
load();
</script>
</body>
</html>
